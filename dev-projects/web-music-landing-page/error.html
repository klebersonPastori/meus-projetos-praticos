<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ops! Algo deu errado</title>
    <style>
        /* Estilização Geral */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Fundo vermelho bem clarinho */
            background-color: #fff5f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #721c24;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }

        /* Ícone/Emoji */
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #856404;
        }

        /* Pequeno detalhe decorativo */
        .cloud-error {
            border: 2px dashed #f5c6cb;
            border-radius: 15px;
            padding: 20px;
            background-color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="cloud-error">
            <div class="icon">☁️⚠️</div>
            <h1>Ops! Conexão Interrompida</h1>
            <p>Parece que houve um problema de comunicação com o nosso servidor na nuvem.</p>
            <p>Por favor, tente atualizar a página em alguns instantes.</p>
        </div>
    </div>

</body>
</html>
